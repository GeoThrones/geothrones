    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #1a1a2e;
      color: #e0d5c1;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Start Screen ── */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: radial-gradient(ellipse at center, #2a1a1a 0%, #0d0d1a 70%);
    }

    #start-screen h1 {
      font-size: 4rem;
      color: #c9a84c;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
      letter-spacing: 6px;
      margin-bottom: 0.5rem;
    }

    #start-screen .subtitle {
      font-size: 1.1rem;
      color: #8a7a6a;
      margin-bottom: 3rem;
      font-style: italic;
    }

    .btn {
      padding: 14px 48px;
      font-size: 1.2rem;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #c9a84c, #a8872a);
      color: #1a1a2e;
      border: none;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s;
    }

    .btn:hover {
      background: linear-gradient(135deg, #dfc06a, #c9a84c);
      transform: scale(1.05);
    }

    /* ── Game Screen ── */
    #game-screen {
      display: none;
      position: relative;
      height: 100vh;
      width: 100vw;
    }

    #map-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: crosshair;
      background: #0d0d1a;
    }

    #map-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: 0 0;
    }

    #map-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: #111122;
      border-bottom: 2px solid #c9a84c33;
      min-height: 56px;
    }

    #round-info {
      font-size: 1rem;
      color: #c9a84c;
      letter-spacing: 2px;
    }

    #score-display {
      font-size: 1rem;
      color: #c9a84c;
      letter-spacing: 2px;
    }

    #prompt-bar {
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      z-index: 30;
      padding: 16px 24px;
      background: #16162aee;
      border-bottom: 1px solid #c9a84c22;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #prompt-text {
      font-size: 1.15rem;
      line-height: 1.5;
      color: #e0d5c1;
      max-width: 800px;
      font-style: italic;
    }

    .marker {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }

    .marker.guess {
      background: #e74c3c;
      border: 1.5px solid #fff;
      box-shadow: 0 0 6px rgba(231, 76, 60, 0.6);
    }

    .marker.answer {
      background: #2ecc71;
      border: 1.5px solid #fff;
      box-shadow: 0 0 6px rgba(46, 204, 113, 0.6);
    }

    .marker-label {
      position: absolute;
      transform: translate(12px, -50%);
      color: #fff;
      font-size: 0.8rem;
      font-weight: bold;
      text-shadow: 0 0 4px #000, 0 0 4px #000;
      white-space: nowrap;
      pointer-events: none;
      z-index: 11;
    }

    .distance-line {
      position: absolute;
      pointer-events: none;
      z-index: 9;
      height: 2px;
      background: repeating-linear-gradient(
        90deg, #fff 0, #fff 6px, transparent 6px, transparent 12px
      );
      transform-origin: 0 50%;
    }

    #submit-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 40;
      padding: 12px 36px;
      font-size: 1rem;
      display: none;
    }

    #zoom-hint {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 35;
      font-size: 0.75rem;
      color: #c9a84c88;
      background: #111122aa;
      padding: 6px 12px;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    /* ── Result Overlay ── */
    #result-overlay {
      display: none;
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #111122ee;
      border: 1px solid #c9a84c44;
      padding: 20px 40px;
      text-align: center;
      z-index: 40;
      min-width: 300px;
    }

    #result-overlay .result-score {
      font-size: 2.5rem;
      color: #c9a84c;
      font-weight: bold;
    }

    #result-overlay .result-distance {
      font-size: 1rem;
      color: #8a7a6a;
      margin: 8px 0 16px;
    }

    /* ── Summary Screen ── */
    #summary-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: radial-gradient(ellipse at center, #2a1a1a 0%, #0d0d1a 70%);
    }

    #summary-screen h2 {
      font-size: 2.5rem;
      color: #c9a84c;
      margin-bottom: 0.5rem;
    }

    #final-score {
      font-size: 4rem;
      color: #c9a84c;
      text-shadow: 0 0 30px rgba(201, 168, 76, 0.4);
      margin-bottom: 0.5rem;
    }

    #final-score-label {
      color: #8a7a6a;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    #round-breakdown {
      list-style: none;
      margin-bottom: 2rem;
      width: 400px;
      max-width: 90vw;
    }

    #round-breakdown li {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #c9a84c22;
      font-size: 0.95rem;
    }

    #round-breakdown li .rb-location { color: #8a7a6a; }
    #round-breakdown li .rb-score { color: #c9a84c; font-weight: bold; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      #start-screen h1 {
        font-size: 2.2rem;
        letter-spacing: 4px;
      }

      #start-screen .subtitle {
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }

      .btn {
        padding: 12px 36px;
        font-size: 1rem;
      }

      #top-bar {
        padding: 8px 16px;
        min-height: 44px;
      }

      #round-info, #score-display {
        font-size: 0.85rem;
      }

      #prompt-bar {
        top: 44px;
        padding: 10px 16px;
      }

      #prompt-text {
        font-size: 0.95rem;
        line-height: 1.4;
      }

      #submit-btn {
        bottom: 16px;
        right: 16px;
        padding: 10px 28px;
        font-size: 0.9rem;
      }

      #result-overlay {
        bottom: 16px;
        padding: 16px 24px;
        min-width: 260px;
      }

      #result-overlay .result-score {
        font-size: 2rem;
      }

      #result-overlay .result-distance {
        font-size: 0.85rem;
      }

      #zoom-hint {
        bottom: 10px;
        left: 10px;
        font-size: 0.65rem;
      }

      #summary-screen h2 {
        font-size: 1.8rem;
      }

      #final-score {
        font-size: 3rem;
      }

      #round-breakdown {
        width: 90vw;
      }

      #round-breakdown li {
        font-size: 0.85rem;
      }

      .marker-label {
        font-size: 0.65rem;
      }

      #map-img {
        max-height: none;
        width: 250%;
        max-width: none;
      }

      #map-wrapper {
        justify-content: flex-start;
      }
    }
  </style>
</head>

let panStartPanY = 0;
let didPan = false;
const MIN_SCALE = 1;
const MAX_SCALE = 6;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  currentRound = 0;
  totalScore = 0;
  roundResults = [];
  questions = shuffle([...ALL_QUESTIONS]).slice(0, ROUNDS_PER_GAME);

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('summary-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';

  resetZoom();
  loadRound();
}

function loadRound() {
  const q = questions[currentRound];
  document.getElementById('round-info').textContent = `ROUND ${currentRound + 1} / ${ROUNDS_PER_GAME}`;
  document.getElementById('score-display').textContent = `SCORE: ${totalScore}`;
  document.getElementById('prompt-text').textContent = q.prompt;

  clearMarkers();
  document.getElementById('result-overlay').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'none';

  guessX = null;
  guessY = null;
  hasGuessed = false;
  resetZoom();
  showHint();
}

// ─── Zoom & Pan ───

function applyTransform() {
  const wrapper = document.getElementById('map-wrapper');
  wrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

function clampPan() {
  const container = document.getElementById('map-container');
  const cRect = container.getBoundingClientRect();
  const img = document.getElementById('map-img');
  const imgW = img.clientWidth * scale;
  const imgH = img.clientHeight * scale;

  const wrapperW = container.clientWidth * scale;
  const wrapperH = container.clientHeight * scale;

  if (imgW <= cRect.width) {
    panX = 0;
  } else {
    const imgLeft = (container.clientWidth - img.clientWidth) / 2;
    const minX = -(imgLeft * scale + imgW - cRect.width);
    const maxX = -imgLeft * scale + (imgLeft * scale);
    panX = Math.max(Math.min(panX, -imgLeft * (scale - 1)), -(imgLeft * (scale - 1) + (imgW - cRect.width)));
  }

  if (imgH <= cRect.height) {
    panY = 0;
  } else {
    const imgTop = (container.clientHeight - img.clientHeight) / 2;
    panY = Math.max(Math.min(panY, -imgTop * (scale - 1)), -(imgTop * (scale - 1) + (imgH - cRect.height)));
  }
}

function zoomAt(newScale, centerX, centerY) {
  const container = document.getElementById('map-container');
  const cRect = container.getBoundingClientRect();

  const cx = centerX !== undefined ? centerX - cRect.left : cRect.width / 2;
  const cy = centerY !== undefined ? centerY - cRect.top : cRect.height / 2;

  const worldX = (cx - panX) / scale;
  const worldY = (cy - panY) / scale;

  scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));

  panX = cx - worldX * scale;
  panY = cy - worldY * scale;

  clampPan();
  applyTransform();
  hideHint();
}

function resetZoom() {
  scale = 1;
  panX = 0;
  panY = 0;
  applyTransform();
}

function hideHint() {
  const hint = document.getElementById('zoom-hint');
  if (hint) hint.style.opacity = '0';
}

function showHint() {
  const hint = document.getElementById('zoom-hint');
  if (hint) hint.style.opacity = '1';
}

// ─── Event Handlers ───

const container = document.getElementById('map-container');

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  zoomAt(scale * factor, e.clientX, e.clientY);
}, { passive: false });

container.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  isPanning = true;
  didPan = false;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panStartPanX = panX;
  panStartPanY = panY;
  container.style.cursor = scale > 1 ? 'grabbing' : 'crosshair';
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  const dx = e.clientX - panStartX;
  const dy = e.clientY - panStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didPan = true;
  if (didPan) {
    panX = panStartPanX + dx;
    panY = panStartPanY + dy;
    clampPan();
    applyTransform();
  }
});

window.addEventListener('mouseup', (e) => {
  if (!isPanning) return;
  isPanning = false;
  container.style.cursor = 'crosshair';

  if (!didPan) {
    handleMapClick(e);
  }
});

// Touch support
let lastTouchDist = 0;
let lastTouchCenter = null;

container.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx * dx + dy * dy);
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  } else if (e.touches.length === 1) {
    isPanning = true;
    didPan = false;
    panStartX = e.touches[0].clientX;
    panStartY = e.touches[0].clientY;
    panStartPanX = panX;
    panStartPanY = panY;
  }
}, { passive: false });

container.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    if (lastTouchDist > 0) {
      zoomAt(scale * (dist / lastTouchDist), cx, cy);
    }
    lastTouchDist = dist;
  } else if (e.touches.length === 1 && isPanning) {
    const dx = e.touches[0].clientX - panStartX;
    const dy = e.touches[0].clientY - panStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didPan = true;
    if (didPan) {
      e.preventDefault();
      panX = panStartPanX + dx;
      panY = panStartPanY + dy;
      clampPan();
      applyTransform();
    }
  }
}, { passive: false });

container.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) {
    lastTouchDist = 0;
    lastTouchCenter = null;
  }
  if (e.touches.length === 0 && isPanning && !didPan) {
    const touch = e.changedTouches[0];
    handleMapClick(touch);
  }
  if (e.touches.length === 0) isPanning = false;
});

function handleMapClick(e) {
  if (hasGuessed) return;

  const img = document.getElementById('map-img');
  const imgRect = img.getBoundingClientRect();

  const clickX = e.clientX - imgRect.left;
  const clickY = e.clientY - imgRect.top;

  if (clickX < 0 || clickY < 0 || clickX > imgRect.width || clickY > imgRect.height) return;

  guessX = (clickX / imgRect.width) * 100;
  guessY = (clickY / imgRect.height) * 100;

  clearMarkers();
  placeMarkerOnMap(guessX, guessY, 'guess');
  document.getElementById('submit-btn').style.display = 'block';
}

function placeMarkerOnMap(pctX, pctY, className, labelText) {
  const wrapper = document.getElementById('map-wrapper');
  const img = document.getElementById('map-img');

  const pixelX = img.offsetLeft + (pctX / 100) * img.clientWidth;
  const pixelY = img.offsetTop + (pctY / 100) * img.clientHeight;

  const marker = document.createElement('div');
  marker.className = `marker ${className}`;
  marker.style.left = `${pixelX}px`;
  marker.style.top = `${pixelY}px`;
  wrapper.appendChild(marker);

  if (labelText) {
    const label = document.createElement('div');
    label.className = 'marker-label';
    label.style.left = `${pixelX}px`;
    label.style.top = `${pixelY}px`;
    label.textContent = labelText;
    wrapper.appendChild(label);
  }

  return { x: pixelX, y: pixelY };
}

function drawLine(x1, y1, x2, y2) {
  const wrapper = document.getElementById('map-wrapper');
  const dx = x2 - x1;
  const dy = y2 - y1;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx) * (180 / Math.PI);

  const line = document.createElement('div');
  line.className = 'distance-line';
  line.style.left = `${x1}px`;
  line.style.top = `${y1}px`;
  line.style.width = `${dist}px`;
  line.style.transform = `rotate(${angle}deg)`;
  wrapper.appendChild(line);
}

function submitGuess() {
  if (guessX === null || hasGuessed) return;
  hasGuessed = true;

  const q = questions[currentRound];

  const guessPos = { };
  const img = document.getElementById('map-img');
  const wrapper = document.getElementById('map-wrapper');
  guessPos.x = img.offsetLeft + (guessX / 100) * img.clientWidth;
  guessPos.y = img.offsetTop + (guessY / 100) * img.clientHeight;

  const ansPos = placeMarkerOnMap(q.x, q.y, 'answer', q.answer);
  drawLine(guessPos.x, guessPos.y, ansPos.x, ansPos.y);

  const pctDist = Math.sqrt(
    Math.pow(guessX - q.x, 2) + Math.pow(guessY - q.y, 2)
  );
  const imgDiag = Math.sqrt(100 * 100 + 100 * 100);
  const miles = Math.round((pctDist / imgDiag) * MAP_MILES_DIAGONAL);

  const score = Math.max(0, Math.round(100 * (1 - miles / 2000)));

  totalScore += score;
  roundResults.push({ location: q.answer, score, miles });

  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('score-display').textContent = `SCORE: ${totalScore}`;
  document.getElementById('result-score-text').textContent = `${score} pts`;
  document.getElementById('result-distance-text').textContent = `${miles} miles away — ${q.answer}`;
  document.getElementById('result-overlay').style.display = 'block';
}

function nextRound() {
  currentRound++;
  if (currentRound >= ROUNDS_PER_GAME) {
    showSummary();
  } else {
    loadRound();
  }
}

function showSummary() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('summary-screen').style.display = 'flex';
  document.getElementById('final-score').textContent = totalScore;

  const list = document.getElementById('round-breakdown');
  list.innerHTML = '';
  roundResults.forEach((r, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="rb-location">Round ${i + 1}: ${r.location} (${r.miles} mi)</span>
      <span class="rb-score">${r.score} pts</span>
    `;
    list.appendChild(li);
  });
}

function clearMarkers() {
  const wrapper = document.getElementById('map-wrapper');
  wrapper.querySelectorAll('.marker, .distance-line, .marker-label').forEach(el => el.remove());
}
</script>
